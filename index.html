<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Hub Pro | Abdullah Ikram</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020205;
            --panel-bg: rgba(8, 8, 15, 0.98);
            --glass-border: 1px solid rgba(0, 242, 255, 0.25);
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0a1f 0%, #020205 100%);
        }

        body::after {
            content: "";
            position: fixed;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            pointer-events: none;
            border-radius: 30px;
            z-index: 1000;
        }

        .clock-frame {
            position: relative;
            padding: 50px 100px;
            border-radius: 40px;
            border: 2px solid rgba(0, 242, 255, 0.2);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            text-align: center;
            transition: 0.5s;
        }

        .clock-frame:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.2);
        }

        #clock {
            font-size: clamp(3rem, 12vw, 8rem);
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-blue);
            text-shadow: 0 0 12px rgba(0, 242, 255, 0.6);
            letter-spacing: 5px;
            margin: 0;
        }

        .side-nav {
            position: fixed;
            left: 35px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1100;
        }

        .nav-btn {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: var(--glass-border);
            color: var(--neon-blue);
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.1);
        }

        .panel {
            position: fixed;
            right: -450px;
            top: 25px;
            width: 380px;
            height: calc(100vh - 50px);
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: var(--glass-border);
            padding: 30px;
            transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 900;
            box-shadow: -20px 0 60px rgba(0,0,0,0.5);
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel.open { right: 25px; }

        .panel h2 {
            margin-top: 0;
            color: var(--neon-blue);
            font-size: 1.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .member-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .member-card.lead { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .member-name { font-weight: 600; display: block; }
        .member-role { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; margin-top: 5px; display: block; }

        textarea {
            width: 100%; height: 150px;
            background: rgba(0,0,0,0.3);
            border: var(--glass-border);
            border-radius: 15px;
            color: #fff; padding: 15px;
            font-family: inherit; resize: none; box-sizing: border-box; outline: none;
        }

        .action-btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-play { background: var(--neon-blue); color: #000; }
        .btn-stop { background: #ff3366; color: #fff; }

        .calc-screen {
            background: #000; border: var(--glass-border); border-radius: 12px;
            padding: 20px; text-align: right; font-size: 1.8rem;
            color: var(--neon-blue); font-family: 'Share Tech Mono', monospace;
            margin-bottom: 15px; height: 40px; overflow: hidden;
        }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .c-btn {
            padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            border-radius: 12px; cursor: pointer; font-weight: 600;
        }
        .c-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon-blue); }
        .c-btn.op { color: var(--neon-blue); }
        .c-btn.eq { background: var(--neon-blue); color: #000; grid-column: span 2; }
    </style>
</head>
<body>

    <div class="clock-frame">
        <div id="clock">00:00:00</div>
    </div>

    <nav class="side-nav">
        <button class="nav-btn" onclick="toggle('team')" title="Project Team">👥</button>
        <button class="nav-btn" onclick="toggle('tts')" title="Speech Engine">🔊</button>
        <button class="nav-btn" onclick="toggle('calc')" title="Calculator">⧓</button>
    </nav>

    <div id="team" class="panel">
        <h2>Project Team</h2>
        <div class="member-card lead">
            <span class="member-name">Abdullah Ikram Mahmoud</span>
            <span class="member-role">Team Leader & Lead Developer</span>
        </div>
        <div class="member-card">
            <span class="member-name">Quantum Assistant</span>
            <span class="member-role">Sub-Processing Unit</span>
        </div>
    </div>

    <div id="tts" class="panel">
        <h2>Speech Engine</h2>
        <textarea id="tts-input" placeholder="اكتب شيئاً ليتم نطقه..."></textarea>
        <button class="action-btn btn-play" onclick="speak()">Execute Speech 🔊</button>
        <button class="action-btn btn-stop" onclick="stopS()">Halt Process ⏹</button>
    </div>

    <div id="calc" class="panel">
        <h2>Advanced Calculator</h2>
        <div class="calc-screen" id="display">0</div>
        <div class="calc-grid">
            <button class="c-btn op" onclick="clr()">AC</button>
            <button class="c-btn op" onclick="put('(')">(</button>
            <button class="c-btn op" onclick="put(')')">)</button>
            <button class="c-btn op" onclick="put('/')">÷</button>
            
            <button class="c-btn" onclick="put('7')">7</button>
            <button class="c-btn" onclick="put('8')">8</button>
            <button class="c-btn" onclick="put('9')">9</button>
            <button class="c-btn op" onclick="put('*')">×</button>
            
            <button class="c-btn" onclick="put('4')">4</button>
            <button class="c-btn" onclick="put('5')">5</button>
            <button class="c-btn" onclick="put('6')">6</button>
            <button class="c-btn op" onclick="put('-')">−</button>
            
            <button class="c-btn" onclick="put('1')">1</button>
            <button class="c-btn" onclick="put('2')">2</button>
            <button class="c-btn" onclick="put('3')">3</button>
            <button class="c-btn op" onclick="put('+')">+</button>
            
            <button class="c-btn" onclick="put('0')">0</button>
            <button class="c-btn" onclick="put('.')">.</button>
            <button class="c-btn eq" onclick="exe()">= RESULT</button>
        </div>
    </div>

    <script>
        // Clock
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Navigation
        function toggle(id) {
            const panels = document.querySelectorAll('.panel');
            const btns = document.querySelectorAll('.nav-btn');
            const targetPanel = document.getElementById(id);
            const wasOpen = targetPanel.classList.contains('open');

            panels.forEach(p => p.classList.remove('open'));
            btns.forEach(b => b.classList.remove('active'));

            if (!wasOpen) {
                targetPanel.classList.add('open');
                const btnIdx = {'team':0, 'tts':1, 'calc':2}[id];
                btns[btnIdx].classList.add('active');
            }
        }

        // TTS Engine
        function speak() {
            window.speechSynthesis.cancel();
            const text = document.getElementById('tts-input').value;
            if(!text.trim()) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = /[\u0600-\u06FF]/.test(text) ? 'ar-SA' : 'en-US';
            window.speechSynthesis.speak(msg);
        }
        function stopS() { window.speechSynthesis.cancel(); }

        // Calculator Engine
        let query = "";
        const screen = document.getElementById('display');

        function put(val) {
            if (query === "0" && val !== ".") query = ""; 
            query += val;
            screen.innerText = query;
        }

        function clr() {
            query = "";
            screen.innerText = "0";
        }

        function exe() {
            try {
                if(!query) return;
                // Using Function instead of eval for slight safety boost
                let result = new Function('return ' + query)();
                query = result.toString();
                screen.innerText = query;
            } catch (err) {
                screen.innerText = "Error";
                query = "";
            }
        }
    </script>
</body>
</html>
